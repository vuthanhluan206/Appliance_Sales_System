# ── Profile Dev Logging ───────────────────────────────────────────────────────
logging.file.path=logs
logging.file.name=dienlanh-dev.log

# ── Fallback Google GenAI API Key for Local Development ────────────────────────
spring.ai.google.genai.api-key=${GEMINI_API_KEY:local_dev_dummy_key_to_prevent_startup_crash}

# ── Fallback Database Configuration for Local Development ─────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:spring_ai_db}

# ── Fallback Vector Store Configuration for Local Development ──────────────────
spring.ai.vectorstore.type=simple



