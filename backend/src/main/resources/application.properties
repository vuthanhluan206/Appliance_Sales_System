spring.application.name=dienlanh
spring.profiles.active=dev


# ── Database (PostgreSQL) ──────────────────────────────────────────────────────
# Railway tự inject hoặc dùng trị số mặc định
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:spring_ai_db}
spring.datasource.username=${PGUSER:dien_lanh}
spring.datasource.password=${PGPASSWORD:dienlanh}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Security / JWT ────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:DienLanhVuThanhLuanSecKetKey2026DefaultValue!}
security.permit-all-urls=/api/auth/login,/api/auth/refresh-token,/api/auth/register,/api/auth/logout,/api/auth/send-otp,/api/auth/verify-otp,/api/auth/forgot-password/**,/actuator/health,/products,/getProduct/**,/categories,/getCategory/**,/services,/getService/**,/reviews,/getReview/**,/reviews/product/**,/posts,/getPost/**,/post/like/**,/api/chat

# ── Email (Resend HTTPS API) ──────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:vuthanhluan4326@dienlanhdongtrieu24h.com}

# OTP
otp.expiry.minutes=5
otp.max.attempts=3

# ── Redis ─────────────────────────────────────────────────────────────────────
# Sử dụng REDIS_URL do Railway tự inject (tự động nhận dạng giao thức SSL/TLS).
# Nếu không có REDIS_URL (ở local), ứng dụng sẽ tự động chuyển sang dùng host và port dự phòng.
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.username=${REDISUSER:default}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=60000ms

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dxybwstzg}
cloudinary.api-key=${CLOUDINARY_API_KEY:624377967571764}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:aMrS2P7b1nDwALH4QR4JZrJyv-U}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS — URL frontend (Railway frontend service URL) ────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Actuator (health check cho Railway) ──────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always



spring.ai.google.genai.api-key=${GEMINI_API_KEY:dummy_key_to_prevent_startup_crash}
spring.ai.vectorstore.type=simple


# ID dự án Google GenAI (Bắt buộc phải set trong Spring AI starter mới dù dùng API Key trực tiếp)
spring.ai.google.genai.project-id=dummy
spring.ai.google.genai.location=us-central1

spring.ai.google.genai.chat.project-id=dummy
spring.ai.google.genai.chat.location=us-central1

spring.ai.google.genai.embedding.project-id=dummy
spring.ai.google.genai.embedding.location=us-central1

# Tên mô hình Gemini được sử dụng cho việc chat/hỏi đáp (ở đây sử dụng gemini-2.5-flash)
spring.ai.google.genai.chat.model=gemini-2.5-flash

# Tên mô hình sinh Vector Nhúng (Embedding Model) của Google.
# Mô hình 'gemini-embedding-001' chuyển đổi văn bản thành vector có kích thước cố định là 768 chiều.
spring.ai.google.genai.embedding.options.model=gemini-embedding-001

# -------------------------------------------------------------
# CẤU HÌNH VECTOR DATABASE (PGVECTOR)
# -------------------------------------------------------------

# Tự động tạo bảng lưu trữ vector (vector_store) trong cơ sở dữ liệu nếu bảng đó chưa tồn tại
spring.ai.vectorstore.pgvector.initialize-schema=true

# Số chiều của vector nhúng. BẮT BUỘC phải khớp với số chiều của Embedding Model.
# Mô hình 'gemini-embedding-001' của Google tạo ra vector 768 chiều, vì vậy giá trị này phải là 768.
spring.ai.vectorstore.pgvector.dimensions=768

# Thuật toán đo khoảng cách (độ tương đồng) giữa các vector.
# COSINE_DISTANCE (khoảng cách Cosine) đo độ tương đồng về hướng của nội dung, rất thích hợp cho tìm kiếm ngữ nghĩa.
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Kiểu chỉ mục (index) giúp tăng tốc độ tìm kiếm vector. 
# NONE có nghĩa là không sử dụng chỉ mục nâng cao nào đặc biệt (thích hợp cho lượng dữ liệu nhỏ). 
# Với dữ liệu lớn có thể cấu hình HNSW hoặc IVFFLAT.
spring.ai.vectorstore.pgvector.index-type=NONE

# Sử dụng chung cấu hình Database PostgreSQL chính cho PgVector

# Tự động cập nhật cấu trúc bảng (schema) trong database dựa trên thực thể (Entities) của Java
spring.jpa.hibernate.ddl-auto=update

# Hiển thị tất cả các câu lệnh SQL được ứng dụng thực thi lên cửa sổ console để debug
spring.jpa.show-sql=true
